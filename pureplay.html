<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pure Play - Split View</title>
    <style>
        /* 基础样式：取消所有边距，全屏平铺 */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Roboto', sans-serif, -apple-system;
            background-color: #ffffff;
            display: flex;
            flex-direction: row; /* 左右风格 */
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            color: #202124;
        }

        /* 左侧面板：播放器核心 */
        .left-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 32px 48px;
            box-sizing: border-box;
            background-color: #ffffff;
            border-right: 1px solid #e0e0e0; /* 分割线取代卡片边缘 */
            min-width: 0; /* 防止 flex 子项溢出 */
        }

        /* 右侧面板：歌单列表 */
        .right-panel {
            width: 350px;
            flex-shrink: 0;
            background-color: #f8f9fa;
            display: flex;
            flex-direction: column;
        }

        /* 顶部封面与歌曲信息 */
        .header-info {
            display: flex;
            flex-direction: row;
            align-items: center;
            margin-bottom: 24px;
        }
        .cover {
            width: 120px;
            height: 120px;
            border-radius: 8px;
            object-fit: cover;
            background-color: #e0e0e0;
            margin-right: 24px;
            flex-shrink: 0;
        }
        .info-text {
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .title {
            font-size: 24px;
            font-weight: bold;
            margin: 0 0 8px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .artist {
            font-size: 15px;
            color: #5f6368;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* 歌词区域 */
        .lrc-container {
            flex: 1;
            width: 100%;
            overflow-y: auto;
            margin-bottom: 24px;
            position: relative;
            scrollbar-width: none; 
            -ms-overflow-style: none;
            /* 上下渐变遮罩边缘 */
            mask-image: linear-gradient(to bottom, transparent 0%, black 15%, black 85%, transparent 100%);
            -webkit-mask-image: linear-gradient(to bottom, transparent 0%, black 15%, black 85%, transparent 100%);
        }
        .lrc-container::-webkit-scrollbar {
            display: none;
        }
        .lrc-list {
            list-style: none;
            padding: 20% 0; 
            margin: 0;
        }
        .lrc-line {
            font-size: 14px;
            color: #80868b;
            margin: 14px 0;
            line-height: 1.5;
            transition: all 0.2s ease;
        }
        .lrc-line.active {
            font-size: 16px;
            color: #1a73e8;
            font-weight: bold;
        }

        /* 进度条与控制区域 */
        .controls-wrapper {
            width: 100%;
            flex-shrink: 0;
        }
        .progress-container {
            width: 100%;
            height: 4px;
            background: #e8eaed;
            border-radius: 2px;
            margin-bottom: 8px;
            cursor: pointer;
            position: relative;
        }
        .progress-bar {
            height: 100%;
            background: #1a73e8;
            border-radius: 2px;
            width: 0%;
            position: relative;
        }
        .progress-bar::after {
            content: '';
            position: absolute;
            right: -6px;
            top: -4px;
            width: 12px;
            height: 12px;
            background: #1a73e8;
            border-radius: 50%;
            opacity: 0;
            transition: opacity 0.2s;
        }
        .progress-container:hover .progress-bar::after {
            opacity: 1;
        }
        .time-container {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: #5f6368;
            margin-bottom: 16px;
        }
        .controls {
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .ctrl-btn {
            background: none;
            border: none;
            font-size: 24px;
            color: #5f6368;
            cursor: pointer;
            margin: 0 24px;
            outline: none;
            transition: color 0.2s;
        }
        .ctrl-btn:active {
            color: #1a73e8;
        }
        .play-btn {
            background: #1a73e8;
            color: white;
            border: none;
            border-radius: 50%;
            width: 56px;
            height: 56px;
            font-size: 24px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            outline: none;
            padding-left: 4px;
            transition: transform 0.1s, background 0.2s;
        }
        .play-btn:active {
            transform: scale(0.95);
            background: #1557b0;
        }
        .play-btn.playing {
            padding-left: 0;
        }

        /* 歌单列表样式 */
        .playlist-header {
            padding: 20px 24px;
            font-size: 16px;
            font-weight: bold;
            color: #202124;
            border-bottom: 1px solid #e0e0e0;
            background: #f8f9fa;
        }
        .playlist-content {
            flex: 1;
            overflow-y: auto;
            padding: 8px 0;
        }
        .playlist-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        .playlist-item {
            padding: 12px 24px;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            border-left: 4px solid transparent;
            transition: background 0.2s;
        }
        .playlist-item:hover {
            background: #f1f3f4;
        }
        .playlist-item.active {
            background: #e8f0fe;
            border-left-color: #1a73e8;
        }
        .playlist-item.active .item-name {
            color: #1a73e8;
            font-weight: bold;
        }
        .item-name {
            font-size: 14px;
            color: #3c4043;
            margin-bottom: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .item-artist {
            font-size: 12px;
            color: #80868b;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* 响应式：针对过于狭窄的屏幕或竖屏设备，可以强制转为上下（可选） */
        @media (max-width: 600px) {
            body {
                flex-direction: column;
            }
            .left-panel {
                padding: 16px;
                border-right: none;
                border-bottom: 1px solid #e0e0e0;
            }
            .right-panel {
                width: 100%;
                flex: 1;
            }
            .header-info {
                margin-bottom: 16px;
            }
            .cover {
                width: 80px;
                height: 80px;
            }
        }
    </style>
</head>
<body>

<div class="left-panel">
    <div class="header-info">
        <img id="cover" class="cover" src="" alt="封面">
        <div class="info-text">
            <div id="title" class="title">歌单加载中...</div>
            <div id="artist" class="artist">请稍候</div>
        </div>
    </div>

    <div class="lrc-container" id="lrc-container">
        <ul class="lrc-list" id="lrc-list">
            <li class="lrc-line">等待播放...</li>
        </ul>
    </div>

    <div class="controls-wrapper">
        <div class="progress-container" id="progress-container">
            <div class="progress-bar" id="progress-bar"></div>
        </div>
        <div class="time-container">
            <span id="current-time">00:00</span>
            <span id="duration">00:00</span>
        </div>
        <div class="controls">
            <button id="prev-btn" class="ctrl-btn">⏮</button>
            <button id="play-btn" class="play-btn">▶</button>
            <button id="next-btn" class="ctrl-btn">⏭</button>
        </div>
    </div>
</div>

<div class="right-panel">
    <div class="playlist-header" id="playlist-count">播放列表 (0)</div>
    <div class="playlist-content">
        <ul class="playlist-list" id="playlist-list">
            </ul>
    </div>
</div>

<audio id="audio" preload="auto"></audio>

<script>
    document.addEventListener("DOMContentLoaded", function() {
        var urlParams = new URLSearchParams(window.location.search);
        var playlistId = urlParams.get('playlistId') || urlParams.get('id');
        var server = urlParams.get('server') || 'netease';

        var titleElem = document.getElementById('title');
        var artistElem = document.getElementById('artist');
        var coverElem = document.getElementById('cover');
        var audioElem = document.getElementById('audio');
        
        var lrcListElem = document.getElementById('lrc-list');
        var lrcContainerElem = document.getElementById('lrc-container');
        var playlistListElem = document.getElementById('playlist-list');
        var playlistCountElem = document.getElementById('playlist-count');
        
        var songs = [];         
        var currentIndex = 0;   
        var parsedLrc = [];     
        var currentLrcIndex = -1;

        if (!playlistId) {
            titleElem.innerText = "未提供歌单ID";
            artistElem.innerText = "请在URL添加 ?playlistId=xxx";
            return;
        }

        var baseUrl = "https://api.qijieya.cn/meting/";
        
        // 1. 获取歌单数据
        fetch(baseUrl + "?type=playlist&id=" + playlistId + "&server=" + server)
            .then(function(res) { return res.json(); })
            .then(function(data) {
                if (data && data.length > 0) {
                    songs = data;
                    playlistCountElem.innerText = "播放列表 (" + songs.length + ")";
                    renderPlaylistView();
                    switchTrack(0, false); 
                } else {
                    titleElem.innerText = "歌单为空或解析失败";
                }
            })
            .catch(function(err) {
                titleElem.innerText = "无法加载歌单";
            });

        // 2. 渲染右侧列表
        function renderPlaylistView() {
            var html = '';
            for (var i = 0; i < songs.length; i++) {
                html += '<li class="playlist-item" id="track-' + i + '" data-index="' + i + '">' +
                            '<div class="item-name">' + (i + 1) + '. ' + songs[i].name + '</div>' +
                            '<div class="item-artist">' + songs[i].artist + '</div>' +
                        '</li>';
            }
            playlistListElem.innerHTML = html;

            // 为每个列表项绑定切歌事件
            var items = playlistListElem.getElementsByClassName('playlist-item');
            for (var j = 0; j < items.length; j++) {
                items[j].addEventListener('click', function() {
                    var idx = parseInt(this.getAttribute('data-index'), 10);
                    switchTrack(idx, true);
                });
            }
        }

        // 3. 核心切歌逻辑
        function switchTrack(index, shouldPlay) {
            if (index < 0 || index >= songs.length) return;

            // 更新右侧列表高亮状态
            var oldActive = playlistListElem.querySelector('.playlist-item.active');
            if (oldActive) oldActive.classList.remove('active');
            
            var newActive = document.getElementById('track-' + index);
            if (newActive) {
                newActive.classList.add('active');
                // 让选中的歌曲在列表中可见
                newActive.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            }

            currentIndex = index;
            var track = songs[index];

            titleElem.innerText = track.name;
            artistElem.innerText = track.artist;
            coverElem.src = track.pic;
            audioElem.src = track.url;

            // 清理上一首歌词
            parsedLrc = [];
            currentLrcIndex = -1;
            lrcListElem.innerHTML = '<li class="lrc-line">歌词加载中...</li>';
            lrcContainerElem.scrollTop = 0;

            // 获取新歌词
            if (track.lrc) {
                fetch(track.lrc)
                    .then(function(res) { return res.text(); })
                    .then(function(lrcText) {
                        parseLrc(lrcText);
                        renderLrcView();
                    })
                    .catch(function() {
                        lrcListElem.innerHTML = '<li class="lrc-line">无歌词文本</li>';
                    });
            }

            if (shouldPlay) {
                audioElem.play();
                playBtn.innerText = "⏸";
                playBtn.classList.add('playing');
            } else {
                playBtn.innerText = "▶";
                playBtn.classList.remove('playing');
            }
        }

        // 4. 解析与渲染歌词
        function parseLrc(text) {
            var lines = text.split('\n');
            var matchReg = /\[(\d{2,}):(\d{2})(?:\.(\d{2,3}))?\]/;
            parsedLrc = [];

            for (var i = 0; i < lines.length; i++) {
                var line = lines[i];
                var match = matchReg.exec(line);
                if (match) {
                    var min = parseInt(match[1], 10);
                    var sec = parseInt(match[2], 10);
                    var ms = match[3] ? parseInt(match[3], 10) : 0;
                    if (match[3] && match[3].length === 2) { ms *= 10; }
                    
                    var time = min * 60 + sec + ms / 1000;
                    var lrcStr = line.replace(/\[\d{2,}:\d{2}(?:\.\d{2,3})?\]/g, '').trim();
                    if (lrcStr) {
                        parsedLrc.push({ time: time, text: lrcStr });
                    }
                }
            }
        }

        function renderLrcView() {
            if (parsedLrc.length === 0) {
                lrcListElem.innerHTML = '<li class="lrc-line">纯音乐，请欣赏</li>';
                return;
            }
            var html = '';
            for (var i = 0; i < parsedLrc.length; i++) {
                html += '<li class="lrc-line" id="lrc-' + i + '">' + parsedLrc[i].text + '</li>';
            }
            lrcListElem.innerHTML = html;
        }

        // 5. 播放控制与进度事件
        var playBtn = document.getElementById('play-btn');
        var prevBtn = document.getElementById('prev-btn');
        var nextBtn = document.getElementById('next-btn');
        var progressBar = document.getElementById('progress-bar');
        var progressContainer = document.getElementById('progress-container');
        var currentTimeElem = document.getElementById('current-time');
        var durationElem = document.getElementById('duration');

        playBtn.addEventListener('click', function() {
            if (songs.length === 0) return;
            if (audioElem.paused) {
                audioElem.play();
                playBtn.innerText = "⏸";
                playBtn.classList.add('playing');
            } else {
                audioElem.pause();
                playBtn.innerText = "▶";
                playBtn.classList.remove('playing');
            }
        });

        prevBtn.addEventListener('click', function() {
            if (songs.length === 0) return;
            var targetIndex = currentIndex - 1 < 0 ? songs.length - 1 : currentIndex - 1;
            switchTrack(targetIndex, true);
        });

        nextBtn.addEventListener('click', function() {
            if (songs.length === 0) return;
            var targetIndex = (currentIndex + 1) % songs.length;
            switchTrack(targetIndex, true);
        });

        audioElem.addEventListener('ended', function() {
            if (songs.length === 0) return;
            var targetIndex = (currentIndex + 1) % songs.length;
            switchTrack(targetIndex, true);
        });

        audioElem.addEventListener('timeupdate', function() {
            var current = audioElem.currentTime;
            var duration = audioElem.duration;
            
            if (duration) {
                var percent = (current / duration) * 100;
                progressBar.style.width = percent + "%";
                currentTimeElem.innerText = formatTime(current);
                durationElem.innerText = formatTime(duration);
            }

            if (parsedLrc.length > 0) {
                var newIndex = -1;
                for (var i = 0; i < parsedLrc.length; i++) {
                    if (current >= parsedLrc[i].time) {
                        newIndex = i;
                    } else {
                        break;
                    }
                }

                if (newIndex !== currentLrcIndex && newIndex !== -1) {
                    if (currentLrcIndex !== -1) {
                        var oldLi = document.getElementById('lrc-' + currentLrcIndex);
                        if (oldLi) oldLi.classList.remove('active');
                    }
                    var newLi = document.getElementById('lrc-' + newIndex);
                    if (newLi) {
                        newLi.classList.add('active');
                        var scrollPos = newLi.offsetTop - lrcContainerElem.clientHeight / 2 + newLi.clientHeight / 2;
                        lrcContainerElem.scrollTo({
                            top: scrollPos,
                            behavior: 'smooth'
                        });
                    }
                    currentLrcIndex = newIndex;
                }
            }
        });

        progressContainer.addEventListener('click', function(e) {
            var rect = this.getBoundingClientRect();
            var clickX = e.clientX - rect.left;
            var width = rect.width;
            var duration = audioElem.duration;
            if (duration) {
                audioElem.currentTime = (clickX / width) * duration;
            }
        });

        function formatTime(seconds) {
            var min = Math.floor(seconds / 60);
            var sec = Math.floor(seconds % 60);
            return (min < 10 ? "0" + min : min) + ":" + (sec < 10 ? "0" + sec : sec);
        }
    });
</script>
</body>
</html>
